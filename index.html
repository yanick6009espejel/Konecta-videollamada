<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konecta - Sala de Espera Virtual</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', serif;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            width: 80%;
            max-width: 600px;
        }
        .logo {
            font-size: 2.8rem;
            color: #C59D83;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px #A67C6D;
        }
        .subtitle {
            letter-spacing: 5px;
            margin-bottom: 40px;
            color: #A67C6D;
            font-size: 1.2rem;
        }
        .welcome-text {
            font-size: 1.6rem;
            margin-bottom: 40px;
            color: #063D3B;
            line-height: 1.4;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #063D3B;
            border: 2px solid #042928;
            color: #FFFFFF;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 2px 2px 5px rgba(4, 41, 40, 0.3);
        }
        .btn:hover {
            background-color: #C59D83;
            border-color: #A67C6D;
            color: #FFFFFF;
        }

</head>

    <div class="container">
        <div class="logo">KONECTA</div>

        <div class="welcome-text">
